scope_id: zoning_corruption_11
domain: government_records
description: Municipal zoning board records revealing systematic developer influence through intermediaries
generation:
  mode: narrative
  temperature: 0.7
  seed: 1110
episodes:
  count: 20
  timeline:
    start: '2024-06-01'
    interval: 3d
  format: >
    Municipal government document bundles. Each episode is a compilation
    of public records from a mid-sized city's zoning and planning process:
    zoning board meeting minutes (with roll-call votes and staff
    recommendations), permit applications with architectural summaries,
    campaign finance filings (contributions with donor name, amount,
    employer), property transfer records (buyer, seller, price, parcel ID),
    public comment submissions, environmental review summaries, and
    inter-departmental memos. Documents are formal, bureaucratic, and
    data-dense with dates, dollar amounts, parcel numbers, and vote counts.
  target_words: 5000
scenario:
  setting: >
    The fictional city of Millbrook (pop. 85,000) has a 7-member Zoning
    Board of Appeals (ZBA). Developer Crestview Holdings LLC wants to
    build a 200-unit luxury apartment complex on a parcel zoned R-1
    (single-family residential), requiring a variance. Crestview is
    controlled by principal Marcus Webb, who operates through a network
    of intermediary LLCs (Lakeside Properties Group, Greenfield
    Development Partners, Summit Point Capital) to obscure ownership.
    Over 20 episodes spanning 3 months, Webb's network makes campaign
    contributions to three ZBA members (Patterson, Kowalski, Rivera),
    hires the spouse of a fourth member (Chen) as a "consultant," and
    secures favorable variance votes that contradict staff
    recommendations. A local journalist files FOIA requests that begin
    to connect the dots, but the full pattern only emerges from reading
    across all records. A rival project (genuine affordable housing by
    Millbrook Community Land Trust) gets denied on technical grounds
    despite staff support.
  voice: >
    Bureaucratic government records — meeting minutes with formal
    language, motions, seconds, and roll-call votes. Campaign finance
    entries are tabular. Property records are legal descriptions.
    Public comments range from formal to emotional. No narrative
    editorializing in the records themselves.
arc:
- id: baseline
  episodes: 1-5
  description: >
    Normal ZBA operations. Routine variance requests (shed setbacks,
    home additions) approved with staff support. Campaign finance
    filings show typical small-dollar contributions from local
    businesses. Property transfers at market rates. ZBA members vote
    consistently with staff recommendations. Crestview Holdings
    files initial zoning inquiry for the R-1 parcel.
  signal_density: none
- id: early_signal
  episodes: 6-10
  description: >
    First connections appear. Lakeside Properties Group (Webb-controlled)
    makes $2,000 contributions to Patterson and Kowalski campaign
    accounts — individually unremarkable but timed before a ZBA
    meeting. A property adjacent to the target parcel transfers from
    an individual to Summit Point Capital at below-market price.
    Crestview's formal variance application is filed with an
    environmental review that's notably more detailed than typical
    applications. Staff recommendation: DENY (insufficient parking,
    density incompatible with R-1 character).
  signal_density: low
- id: red_herring
  episodes: 9-11
  description: >
    Millbrook Community Land Trust submits a competing application for
    a 40-unit affordable housing project on a nearby parcel, also
    requiring a variance. Strong staff support, community backing,
    federal grant contingent on zoning approval. Appears to be the
    major zoning controversy — public comments flood in about
    affordable housing, drawing attention away from the Crestview
    application. The Land Trust project is ultimately denied 4-3 on
    a technicality (setback calculation).
  signal_density: medium
- id: escalation
  episodes: 11-16
  description: >
    The influence network becomes active. Greenfield Development Partners
    (another Webb LLC) contributes $5,000 to Rivera's campaign fund.
    Chen's spouse appears on Crestview's consultant payroll ($8,000/month
    for "community engagement"). Patterson requests a tabling of the
    Crestview vote "for further study," buying time for more contributions.
    Staff issues a second recommendation: still DENY, citing traffic
    impact study deficiencies. ZBA schedules a special session for the
    Crestview vote. Property records show Summit Point Capital acquiring
    a second adjacent parcel. FOIA requests filed by journalist Sarah
    Okonkwo of the Millbrook Herald — requests for all campaign finance
    records of ZBA members and property transfers within 500 feet of
    the target parcel.
  signal_density: high
- id: root_cause
  episodes: 17-20
  description: >
    Full pattern visible. ZBA approves Crestview variance 4-3 (Patterson,
    Kowalski, Rivera, Chen voting yes — all linked to Webb's network).
    Dissenting members cite staff recommendation. Campaign finance totals:
    Webb's network contributed $14,000 to yes-voters, $0 to no-voters.
    Property records reveal all three intermediary LLCs share the same
    registered agent address as Crestview Holdings. Chen's spouse
    "consulting" contract expires the week after the vote. Okonkwo's
    FOIA responses arrive showing the contribution timeline aligned
    with key procedural dates.
  signal_density: high
noise:
  description: >
    Routine municipal operations — building permits, minor zoning
    compliance matters, public works updates, tax assessment reviews,
    standard campaign contributions from established local businesses.
  examples:
  - Routine building permit for residential addition approved
  - Annual campaign finance filing with small contributions from local businesses
  - Public works committee meeting on road resurfacing schedule
  - Property tax assessment appeal for commercial property
distractors:
  count: 20
  target_words: 5000
  seed: 1111
  max_similarity: 0.3
  themes:
  - id: school_board
    scenario: >
      School board proceedings — budget discussions, teacher contract
      negotiations, curriculum review, facility maintenance proposals.
      Standard municipal governance with no zoning or development
      content.
    excluded_terms:
    - Crestview
    - Webb
    - Lakeside Properties
    - Greenfield Development
    - Summit Point
    - variance
    - ZBA
    - zoning
  - id: parks_recreation
    scenario: >
      Parks and recreation department operations — trail maintenance,
      community center programming, sports league scheduling, park
      improvement grants. Municipal services with no development
      or campaign finance content.
    excluded_terms:
    - Crestview
    - Webb
    - variance
    - campaign contribution
    - zoning
    - property transfer
    - LLC
  - id: utilities_infrastructure
    scenario: >
      Municipal utility operations — water treatment plant upgrades,
      stormwater management, electrical grid maintenance, fiber optic
      expansion proposals. Infrastructure records with no zoning or
      political content.
    excluded_terms:
    - Crestview
    - Webb
    - variance
    - campaign finance
    - zoning board
    - property transfer
    - developer
key_facts:
- id: webb_controls_llcs
  fact: Marcus Webb controls Crestview Holdings and three intermediary LLCs (Lakeside Properties Group, Greenfield Development Partners, Summit Point Capital) that share the same registered agent
  first_appears: escalation:2
  reinforced_in:
  - root_cause:2
  - root_cause:4
- id: contribution_to_voters
  fact: Webb's LLC network contributed $14,000 total to the four ZBA members who voted yes and $0 to those who voted no
  first_appears: early_signal:2
  reinforced_in:
  - escalation:1
  - root_cause:1
  - root_cause:3
- id: staff_denied_twice
  fact: ZBA staff recommended DENY on the Crestview variance twice citing insufficient parking and traffic impact deficiencies
  first_appears: early_signal:4
  reinforced_in:
  - escalation:4
- id: chen_spouse_consultant
  fact: ZBA member Chen's spouse was paid $8,000/month by Crestview as a consultant with the contract ending the week after the favorable vote
  first_appears: escalation:3
  reinforced_in:
  - root_cause:2
- id: contribution_timing
  fact: campaign contributions from Webb's LLCs were timed to precede key ZBA procedural dates
  first_appears: early_signal:2
  reinforced_in:
  - escalation:1
  - root_cause:3
- id: adjacent_parcels
  fact: Summit Point Capital acquired two parcels adjacent to the target property at below-market prices
  first_appears: early_signal:3
  reinforced_in:
  - escalation:5
- id: land_trust_denied
  fact: the Millbrook Community Land Trust's affordable housing project was denied on a technicality despite staff support and federal grant contingency
  first_appears: red_herring:2
  reinforced_in:
  - root_cause:1
- id: foia_connects_dots
  fact: journalist Sarah Okonkwo's FOIA requests revealed the campaign finance timeline and LLC ownership connections
  first_appears: escalation:5
  reinforced_in:
  - root_cause:3
  - root_cause:4
questions:
- id: zc11_q01_longitudinal
  checkpoint_after: 6
  type: longitudinal
  prompt: Are there any unusual patterns in the recent campaign finance filings or property transfers?
  ground_truth:
    canonical_answer: >
      Lakeside Properties Group made contributions to two ZBA members
      (Patterson and Kowalski) timed shortly before a board meeting.
      A property adjacent to the Crestview target parcel transferred
      to Summit Point Capital at below-market price. Individually
      unremarkable, but the timing and proximity are worth noting.
    key_facts:
    - contribution_timing
    - adjacent_parcels
    evidence:
    - early_signal:2
    - early_signal:3
- id: zc11_q02_null
  checkpoint_after: 6
  type: null_hypothesis
  prompt: What is the ZBA's typical approval rate for variance requests?
  ground_truth:
    canonical_answer: >
      Based on recent meetings, the ZBA typically approves routine
      variance requests (setback adjustments, home additions) when
      supported by staff recommendation. Votes tend to be unanimous
      or near-unanimous on routine matters.
    key_facts: []
    evidence:
    - baseline:2
    - baseline:4
- id: zc11_q03_longitudinal
  checkpoint_after: 12
  type: longitudinal
  prompt: Is there evidence that any developer is attempting to influence ZBA decisions through financial means?
  ground_truth:
    canonical_answer: >
      Yes. Multiple LLCs (Lakeside Properties Group, Greenfield
      Development Partners) have made contributions to ZBA members
      timed before key votes. Summit Point Capital is acquiring
      adjacent properties. ZBA member Chen's spouse has been hired
      as a consultant by Crestview Holdings. The staff recommendation
      to DENY has been issued but the board is delaying the vote.
    key_facts:
    - contribution_to_voters
    - contribution_timing
    - chen_spouse_consultant
    - staff_denied_twice
    evidence:
    - early_signal:2
    - escalation:1
    - escalation:3
- id: zc11_q04_negative
  checkpoint_after: 12
  type: negative
  expected_answer_polarity: negative
  prompt: Was the Community Land Trust affordable housing project denied for legitimate reasons?
  ground_truth:
    canonical_answer: >
      The stated reason was a setback calculation technicality, but
      the project had staff support and federal grant contingency.
      The denial is questionable given that the ZBA is simultaneously
      considering approving a much larger variance for Crestview
      despite staff opposition. The contrast suggests the technicality
      may have been selectively applied.
    key_facts:
    - land_trust_denied
    - staff_denied_twice
    evidence:
    - red_herring:2
    - escalation:4
- id: zc11_q05_temporal
  checkpoint_after: 16
  type: temporal
  prompt: Reconstruct the timeline of financial connections between Webb's network and ZBA voting members.
  ground_truth:
    canonical_answer: >
      Before early meetings: Lakeside Properties Group contributes
      to Patterson and Kowalski. Before the special session: Greenfield
      Development Partners contributes $5,000 to Rivera. Throughout:
      Chen's spouse receives $8,000/month from Crestview as consultant.
      Summit Point Capital acquires adjacent parcels. All LLCs share
      the same registered agent. Total: $14,000 to yes-voting members.
    key_facts:
    - contribution_to_voters
    - contribution_timing
    - chen_spouse_consultant
    - webb_controls_llcs
    evidence:
    - early_signal:2
    - escalation:1
    - escalation:3
    - root_cause:2
- id: zc11_q06_evidence
  checkpoint_after: 16
  type: evidence_sufficiency
  prompt: Is there enough evidence to refer this matter for an ethics investigation?
  ground_truth:
    canonical_answer: >
      Yes. The pattern shows: (1) campaign contributions from entities
      linked to the developer timed before key votes, (2) a consulting
      arrangement with a board member's spouse, (3) a vote contradicting
      staff recommendations, (4) all contributing LLCs sharing the same
      registered agent. Each element individually might be coincidence;
      together they constitute a pattern warranting investigation.
    key_facts:
    - webb_controls_llcs
    - contribution_to_voters
    - chen_spouse_consultant
    - staff_denied_twice
    - contribution_timing
    evidence:
    - escalation:2
    - escalation:3
    - root_cause:2
- id: zc11_q07_longitudinal
  checkpoint_after: 20
  type: longitudinal
  prompt: What is the full scope of Marcus Webb's influence operation on the Millbrook ZBA?
  ground_truth:
    canonical_answer: >
      Webb operated through three intermediary LLCs (Lakeside Properties
      Group, Greenfield Development Partners, Summit Point Capital) that
      all share the same registered agent as Crestview Holdings. The
      network contributed $14,000 to four ZBA members (Patterson,
      Kowalski, Rivera, Chen) who all voted yes on the variance. Chen's
      spouse was paid $8,000/month as a Crestview "consultant." Summit
      Point Capital acquired adjacent parcels at below-market prices.
      Contributions were timed to precede key procedural dates. The
      variance was approved 4-3 against two staff DENY recommendations.
      Meanwhile, a competing affordable housing project was denied on
      a technicality despite staff support.
    key_facts:
    - webb_controls_llcs
    - contribution_to_voters
    - chen_spouse_consultant
    - adjacent_parcels
    - contribution_timing
    - staff_denied_twice
    - land_trust_denied
    - foia_connects_dots
    evidence:
    - early_signal:2
    - escalation:1
    - escalation:3
    - root_cause:1
    - root_cause:3
- id: zc11_q08_counterfactual
  checkpoint_after: 20
  type: counterfactual
  prompt: If the city required real-time disclosure of campaign contributions within 48 hours of a vote, which votes would have been affected?
  ground_truth:
    canonical_answer: >
      The contributions from Lakeside Properties to Patterson and
      Kowalski, and from Greenfield Development to Rivera, were all
      timed before key ZBA meetings. Real-time disclosure would have
      made these connections visible to the public, press, and other
      board members before the votes. This likely would have triggered
      recusal requirements or at minimum public scrutiny that could
      have changed the 4-3 outcome.
    key_facts:
    - contribution_timing
    - contribution_to_voters
    - foia_connects_dots
    evidence:
    - early_signal:2
    - escalation:1
    - root_cause:3
- id: zc11_q09_action
  checkpoint_after: 20
  type: action_recommendation
  prompt: What governance reforms would prevent this type of influence in the future?
  ground_truth:
    canonical_answer: >
      Require real-time campaign contribution disclosure (48-hour
      window before votes). Mandate beneficial ownership disclosure
      for all LLC applicants. Require automatic recusal when a board
      member or family member has a financial relationship with an
      applicant. Implement mandatory cooling-off periods between
      contributions and votes. Create an independent ethics review
      for variance approvals that override staff recommendations.
      Publish all property transfers within a radius of pending
      applications.
    key_facts:
    - webb_controls_llcs
    - contribution_timing
    - chen_spouse_consultant
    - staff_denied_twice
    evidence:
    - root_cause:2
    - root_cause:4
- id: zc11_q10_negative
  checkpoint_after: 20
  type: negative
  expected_answer_polarity: negative
  prompt: Could these campaign contributions be normal, legitimate political donations unrelated to the variance?
  ground_truth:
    canonical_answer: >
      No. The pattern makes coincidence implausible: all contributing
      LLCs share the same registered agent as the developer, contributions
      went exclusively to yes-voting members ($14,000 total, $0 to
      no-voters), timing correlated with procedural dates, and the
      consulting arrangement with Chen's spouse ended immediately after
      the vote. Individual contributions might be legitimate; the
      aggregate pattern is not.
    key_facts:
    - webb_controls_llcs
    - contribution_to_voters
    - contribution_timing
    - chen_spouse_consultant
    evidence:
    - early_signal:2
    - escalation:1
    - root_cause:2
    - root_cause:3
