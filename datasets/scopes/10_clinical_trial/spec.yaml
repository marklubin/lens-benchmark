scope_id: clinical_trial_10
domain: medical_records
description: Clinical trial monitoring data revealing delayed hepatotoxicity masked by dose-response lag
generation:
  mode: narrative
  temperature: 0.7
  seed: 1010
episodes:
  count: 20
  timeline:
    start: '2025-03-03'
    interval: 3d
  format: >
    Clinical trial data bundle from a Phase IIb study of XR-7491 (oral
    JAK inhibitor for rheumatoid arthritis). Each episode is a monitoring
    snapshot containing: protocol status header (site, PI, enrollment),
    adverse event reports (AE ID, subject ID, onset date, severity, coded
    term, relationship assessment), laboratory panels (liver function,
    CBC, metabolic), dosing logs (subject ID, dose level, compliance %),
    pharmacokinetic summaries, and Data Safety Monitoring Board (DSMB)
    notes. All values are numeric with standard clinical formatting.
    Episodes are terse clinical data — no editorial commentary.
  target_words: 5000
scenario:
  setting: >
    A multi-site Phase IIb trial ("AURORA-2") of XR-7491, a novel JAK1/3
    inhibitor for moderate-to-severe rheumatoid arthritis. 240 subjects
    randomized across 3 dose arms (5mg, 15mg, 30mg BID) and placebo.
    The drug works — ACR20/50 response rates at Week 12 are significantly
    better than placebo. But a delayed hepatotoxicity signal emerges:
    ALT/AST elevations appear 4-6 weeks after dose initiation, with a
    dose-dependent pattern that is only visible when comparing the
    high-dose arm's trajectory against the others. Individual lab values
    stay within normal range for most of the study. The signal is masked
    by three factors: (1) the 4-6 week lag means early data monitoring
    reviews see clean labs, (2) the highest-dose arm has the best
    efficacy, creating pressure to interpret borderline liver values as
    acceptable, (3) three subjects on placebo have elevated baseline ALT
    from pre-existing conditions, creating noise. By Week 16, two
    high-dose subjects meet Hy's Law criteria (ALT >3×ULN with total
    bilirubin >2×ULN without other causes), triggering a clinical hold.
    The safety signal was present from Week 8 but only visible in
    aggregate trajectory analysis.
  voice: >
    Clinical trial documentation — terse, acronym-heavy, tabular.
    Adverse events use MedDRA coding. Lab results are numeric with
    reference ranges. DSMB notes are formal minutes. No narrative
    editorializing — the data speaks through numbers and standard
    clinical assessments.
arc:
- id: baseline
  episodes: 1-5
  description: >
    Study initiation and early enrollment. Clean baseline labs across
    all arms. First dosing logs show good compliance. AE reports are
    minor (headache, GI disturbances — expected class effects). DSMB
    Review 1 notes "no safety signals." Placebo arm subjects with
    elevated baseline ALT noted (pre-existing NAFLD, alcohol use).
    Efficacy data starting to separate from placebo.
  signal_density: none
- id: early_signal
  episodes: 6-10
  description: >
    Week 6-8 data. High-dose arm (30mg) showing first subtle ALT
    elevations — mean ALT moves from 22 U/L to 31 U/L, still within
    normal range (ULN=40). Individual subjects: most normal, two with
    ALT 35-38 U/L. DSMB Review 2 notes "liver function within normal
    limits across all arms." Efficacy continues to favor high dose.
    Placebo ALT noise from pre-existing conditions continues. One
    15mg subject has transient ALT elevation attributed to acetaminophen.
  signal_density: low
- id: red_herring
  episodes: 9-11
  description: >
    Three placebo subjects show ALT elevations (45-55 U/L) — explained
    by pre-existing NAFLD, holiday alcohol consumption, and concomitant
    statin initiation. Site investigators reassured that liver signals
    are "background noise." This creates a framing effect — when
    high-dose elevations appear later, the instinct is to attribute
    them to similar benign causes.
  signal_density: medium
- id: escalation
  episodes: 11-16
  description: >
    Week 10-14 data. High-dose arm ALT trajectory diverges clearly:
    mean ALT now 42 U/L (vs 24 placebo, 28 low-dose, 33 mid-dose).
    Four high-dose subjects now above ULN. One subject at 3.1×ULN
    (124 U/L), dose reduced per protocol. Site PI attributes to
    "concomitant medication" but causality assessment is "possibly
    related." Mid-dose arm beginning to show subtle trend (mean ALT
    33→37 U/L). Bilirubin still normal in all subjects. DSMB Review 3
    requests "enhanced liver monitoring" for high-dose arm.
  signal_density: high
- id: root_cause
  episodes: 17-20
  description: >
    Week 15-18 data. Two high-dose subjects meet Hy's Law criteria:
    ALT >3×ULN concurrent with total bilirubin >2×ULN, no alternative
    etiology identified. FDA clinical hold issued. Retrospective
    trajectory analysis reveals the dose-dependent ALT curve was
    visible from Week 8 but masked by the 4-6 week lag and placebo
    noise. The mid-dose arm is now showing the same trajectory the
    high-dose arm showed 4 weeks earlier. Pattern is clear: JAK1/3
    inhibition causes delayed, dose-dependent hepatocyte injury.
    DSMB unblinding reveals all 6 subjects with ALT >2×ULN were in
    the 30mg arm.
  signal_density: high
noise:
  description: >
    Routine clinical trial operations — enrollment updates, minor AEs
    (headache, nausea), efficacy readouts, compliance monitoring,
    standard lab panels within normal limits, site coordination.
  examples:
  - Subject enrollment and randomization at new site
  - Minor GI adverse events (nausea grade 1, diarrhea grade 1) — expected class effects
  - ACR20/50 efficacy results showing dose response
  - Pharmacokinetic sampling and trough level analysis
distractors:
  count: 20
  target_words: 5000
  seed: 1011
  max_similarity: 0.3
  themes:
  - id: cardiology_trial
    scenario: >
      Phase III cardiovascular outcomes trial for an SGLT2 inhibitor.
      Routine safety monitoring — MACE events, heart failure
      hospitalizations, renal function panels. No liver safety
      concerns. Standard DSMB reviews with no actionable findings.
    excluded_terms:
    - XR-7491
    - JAK inhibitor
    - hepatotoxicity
    - Hy's Law
    - ALT elevation
    - clinical hold
    - AURORA
  - id: oncology_biomarker
    scenario: >
      Biomarker-driven oncology trial — tumor genomic profiling,
      PD-L1 expression levels, ctDNA monitoring, response
      assessments by RECIST criteria. Safety monitoring for
      immune-related adverse events (dermatologic, endocrine).
    excluded_terms:
    - XR-7491
    - JAK inhibitor
    - hepatotoxicity
    - Hy's Law
    - ALT elevation
    - clinical hold
    - rheumatoid arthritis
  - id: regulatory_submissions
    scenario: >
      Regulatory submission preparation — CMC documentation,
      stability data, manufacturing batch records, FDA meeting
      minutes on pathway discussions. Administrative and
      regulatory operations with no safety data.
    excluded_terms:
    - XR-7491
    - hepatotoxicity
    - Hy's Law
    - ALT elevation
    - adverse event
    - clinical hold
key_facts:
- id: dose_dependent_alt
  fact: ALT elevations in the XR-7491 trial are dose-dependent with the 30mg arm showing the clearest trajectory
  first_appears: early_signal:2
  reinforced_in:
  - escalation:1
  - escalation:3
  - root_cause:1
- id: delayed_onset
  fact: the hepatotoxicity signal has a 4-6 week lag from dose initiation making early monitoring reviews appear clean
  first_appears: early_signal:3
  reinforced_in:
  - escalation:2
  - root_cause:2
- id: hys_law
  fact: two high-dose subjects met Hy's Law criteria with ALT >3xULN concurrent with bilirubin >2xULN
  first_appears: root_cause:1
  reinforced_in:
  - root_cause:3
- id: placebo_noise
  fact: placebo subjects with elevated baseline ALT from pre-existing conditions created noise that masked the drug signal
  first_appears: red_herring:1
  reinforced_in:
  - red_herring:3
  - escalation:2
- id: mid_dose_lagging
  fact: the 15mg mid-dose arm is now showing the same ALT trajectory the 30mg arm showed 4 weeks earlier
  first_appears: escalation:4
  reinforced_in:
  - root_cause:2
- id: clinical_hold
  fact: FDA issued a clinical hold on XR-7491 after Hy's Law cases were identified
  first_appears: root_cause:1
  reinforced_in:
  - root_cause:4
- id: retrospective_signal
  fact: retrospective trajectory analysis revealed the safety signal was present from Week 8 but missed in real-time monitoring
  first_appears: root_cause:2
  reinforced_in:
  - root_cause:4
- id: efficacy_masking
  fact: the highest-dose arm had the best efficacy which created pressure to interpret borderline liver values as acceptable
  first_appears: escalation:1
  reinforced_in:
  - escalation:3
  - root_cause:3
questions:
- id: ct10_q01_longitudinal
  checkpoint_after: 6
  type: longitudinal
  prompt: Are there any concerning trends in the safety data across dose arms?
  ground_truth:
    canonical_answer: >
      The high-dose arm (30mg) is showing subtle ALT elevations — mean ALT
      has moved from 22 to 31 U/L, still within normal range but trending
      upward. Two individual subjects have ALT values of 35-38 U/L.
      This is very early and could be noise, but the dose-dependency
      is worth monitoring.
    key_facts:
    - dose_dependent_alt
    evidence:
    - early_signal:2
- id: ct10_q02_null
  checkpoint_after: 6
  type: null_hypothesis
  prompt: What are the most common adverse events reported across all arms?
  ground_truth:
    canonical_answer: >
      The most common adverse events are headache and GI disturbances
      (nausea, diarrhea) — expected class effects of JAK inhibitors.
      These are Grade 1-2 and occur across all active arms.
    key_facts: []
    evidence:
    - baseline:3
- id: ct10_q03_longitudinal
  checkpoint_after: 12
  type: longitudinal
  prompt: Is there a dose-dependent safety signal emerging in the liver function data?
  ground_truth:
    canonical_answer: >
      Yes. The 30mg arm shows a clear upward ALT trajectory: baseline
      22 → Week 8 mean 31 → now 42 U/L (above ULN). Four subjects are
      above ULN, one at 3.1×ULN requiring dose reduction. The 15mg arm
      is also beginning to trend upward (33→37 U/L). The 5mg and placebo
      arms are stable. The pattern is dose-dependent.
    key_facts:
    - dose_dependent_alt
    - delayed_onset
    - mid_dose_lagging
    evidence:
    - early_signal:2
    - escalation:1
    - escalation:3
- id: ct10_q04_negative
  checkpoint_after: 12
  type: negative
  expected_answer_polarity: negative
  prompt: Are the placebo ALT elevations evidence that liver effects are not drug-related?
  ground_truth:
    canonical_answer: >
      No. The placebo ALT elevations have identified causes — pre-existing
      NAFLD, alcohol use, and statin initiation. These are background
      noise, not evidence against a drug effect. The dose-dependent
      pattern in the active arms (30mg > 15mg > 5mg ≈ placebo) is
      the relevant signal.
    key_facts:
    - placebo_noise
    - dose_dependent_alt
    evidence:
    - red_herring:1
    - escalation:1
- id: ct10_q05_temporal
  checkpoint_after: 16
  type: temporal
  prompt: When was the hepatotoxicity signal first detectable in the data?
  ground_truth:
    canonical_answer: >
      The signal was first detectable around Week 8, when the high-dose
      arm mean ALT began diverging from other arms. However, individual
      values were still within normal range, and the DSMB Review 2
      concluded "liver function within normal limits." The 4-6 week lag
      from dose initiation to ALT elevation meant the earliest monitoring
      windows showed clean data.
    key_facts:
    - delayed_onset
    - retrospective_signal
    - dose_dependent_alt
    evidence:
    - early_signal:2
    - early_signal:3
    - escalation:1
- id: ct10_q06_evidence
  checkpoint_after: 16
  type: evidence_sufficiency
  prompt: Is there sufficient evidence to recommend suspending the 30mg dose arm?
  ground_truth:
    canonical_answer: >
      Yes. Four subjects have ALT above ULN, one required dose reduction
      at 3.1×ULN, and the trajectory is accelerating. The dose-dependence
      is clear. The mid-dose arm is lagging by ~4 weeks on the same
      curve. Continuing the 30mg arm risks Hy's Law cases.
    key_facts:
    - dose_dependent_alt
    - mid_dose_lagging
    - delayed_onset
    evidence:
    - escalation:1
    - escalation:3
    - escalation:4
- id: ct10_q07_longitudinal
  checkpoint_after: 20
  type: longitudinal
  prompt: What is the complete hepatotoxicity profile of XR-7491 based on all available data?
  ground_truth:
    canonical_answer: >
      XR-7491 causes delayed, dose-dependent hepatocyte injury. The
      mechanism produces ALT elevations beginning 4-6 weeks after dose
      initiation. The 30mg arm trajectory: baseline 22 → Week 8 31 →
      Week 12 42 → Week 16 >3×ULN in multiple subjects. Two subjects
      met Hy's Law criteria. The 15mg arm shows the same trajectory
      lagged by ~4 weeks. The signal was present from Week 8 but was
      masked by the onset lag, placebo noise from pre-existing conditions,
      and the strong efficacy signal creating confirmation bias.
    key_facts:
    - dose_dependent_alt
    - delayed_onset
    - hys_law
    - mid_dose_lagging
    - placebo_noise
    - retrospective_signal
    - efficacy_masking
    evidence:
    - early_signal:2
    - escalation:1
    - escalation:4
    - root_cause:1
    - root_cause:2
- id: ct10_q08_counterfactual
  checkpoint_after: 20
  type: counterfactual
  prompt: If the DSMB had required trajectory analysis rather than point-in-time monitoring, when could the hold have been issued?
  ground_truth:
    canonical_answer: >
      A trajectory analysis comparing dose-arm mean ALT slopes would
      have detected the divergence at Week 8-10, approximately 6-8 weeks
      before the actual clinical hold. This would have prevented the
      Hy's Law cases, which occurred at Weeks 15-16. The point-in-time
      approach of comparing individual values against ULN missed the
      signal because values were within normal range until Week 12.
    key_facts:
    - delayed_onset
    - retrospective_signal
    - hys_law
    evidence:
    - early_signal:2
    - escalation:1
    - root_cause:2
- id: ct10_q09_action
  checkpoint_after: 20
  type: action_recommendation
  prompt: What changes to the safety monitoring protocol should be recommended for future trials of this drug class?
  ground_truth:
    canonical_answer: >
      Implement trajectory-based liver monitoring comparing dose-arm
      mean ALT slopes, not just individual values against ULN. Require
      blinded aggregate trajectory plots at each DSMB review. Set
      dose-arm divergence thresholds (e.g., >10 U/L separation sustained
      over 2 visits). Account for the 4-6 week onset lag by extending
      initial monitoring through Week 12. Pre-stratify for baseline
      liver conditions to separate drug signal from noise. Consider
      pharmacogenomic screening for hepatotoxicity susceptibility.
    key_facts:
    - delayed_onset
    - placebo_noise
    - retrospective_signal
    - efficacy_masking
    evidence:
    - root_cause:2
    - root_cause:4
- id: ct10_q10_negative
  checkpoint_after: 20
  type: negative
  expected_answer_polarity: negative
  prompt: Does the strong efficacy data justify continuing the 30mg arm despite the liver signal?
  ground_truth:
    canonical_answer: >
      No. Two subjects have met Hy's Law criteria, which carries a
      10-50% risk of fatal drug-induced liver injury. The efficacy
      benefit does not justify this risk, particularly when lower doses
      also show efficacy (though less robust). The risk-benefit calculus
      may support continued development of the 5mg or 15mg doses with
      enhanced monitoring, but the 30mg arm should remain suspended.
    key_facts:
    - hys_law
    - efficacy_masking
    - dose_dependent_alt
    evidence:
    - root_cause:1
    - root_cause:3
