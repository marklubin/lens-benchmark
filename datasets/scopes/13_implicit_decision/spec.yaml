      decided," "the team agreed," "after discussion we chose," "voted
      to go with." Topics include onboarding flow, pricing page design,
      tutorial removal, feature prioritization. The explicit decision
      language contrasts with the signal episodes where the auth
      decision is never stated.
    excluded_terms:
    - Redis
    - session token
    - JWT
    - authentication
    - auth
    - login
    - revocation
