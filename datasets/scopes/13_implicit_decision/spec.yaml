      debates tradeoffs, and clearly states the outcome: "We're going
      with Postgres," "After benchmarking, chose TimescaleDB for
      time-series data." Structurally similar to auth discussions
      but with clear, recorded decisions.
    excluded_terms:
    - Redis
    - session token
    - JWT
    - authentication
    - auth
    - login
    - revocation
    - logged out
