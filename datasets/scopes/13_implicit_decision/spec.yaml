questions:
- id: id13_q01_longitudinal
  checkpoint_after: 5
  type: longitudinal
  prompt: What approach was chosen for authentication?
  ground_truth:
    canonical_answer: >
      The team chose Redis session tokens for authentication. This was
      never explicitly decided or voted on — instead, after debating JWT
      versus Redis sessions, Mike opened a PR implementing a Redis session
      store with token rotation. The team treated this as the de facto
      decision without any recorded agreement.
    key_facts:
    - implicit_redis_chosen
    - no_explicit_decision
    evidence:
    - deliberation:2
    - implicit_decision:1
- id: id13_q02_longitudinal
  checkpoint_after: 5
  type: longitudinal
  prompt: Why was JWT not selected for authentication?
  ground_truth:
    canonical_answer: >
      JWT was not selected because Mike raised a fundamental concern about
      token revocation. If a JWT token leaks, it cannot be invalidated
      without maintaining a server-side blacklist, which reintroduces the
      server-side state that JWT was meant to eliminate. This negates the
      core stateless benefit of JWT. Redis session tokens handle revocation
      natively by simply deleting the session key.
    key_facts:
    - jwt_rejected_revocation
    - redis_handles_revocation
    evidence:
    - deliberation:1
    - deliberation:2
- id: id13_q03_evidence
  checkpoint_after: 5
  type: evidence_sufficiency
  prompt: What authentication decisions are still open?
  ground_truth:
    canonical_answer: >
      Based on the evidence, the authentication approach itself appears
      settled — Mike has begun implementing Redis session tokens. However,
      no explicit decision was ever recorded. There was no team vote, no
      documented agreement, and no meeting where the team formally chose
      Redis over JWT. The decision was made implicitly through action
      rather than through any formal process.
    key_facts:
    - implicit_redis_chosen
    - no_explicit_decision
    evidence:
    - implicit_decision:1
    - deliberation:2
- id: id13_q04_longitudinal
  checkpoint_after: 8
  type: longitudinal
  prompt: What approach was chosen for authentication?
  ground_truth:
    canonical_answer: >
      Redis session tokens were chosen for authentication. The decision
      was implicit — after discussions where JWT revocation concerns were
      raised and Redis session tokens were suggested as an alternative,
      Mike opened a PR implementing the Redis session store. No explicit
      team decision was recorded. Subsequent discussions reference session
      infrastructure without revisiting the auth decision, confirming it
      is treated as settled.
    key_facts:
    - implicit_redis_chosen
    - no_explicit_decision
    - jwt_rejected_revocation
    evidence:
    - deliberation:1
    - deliberation:2
    - implicit_decision:1
    - noise:3
- id: id13_q05_longitudinal
  checkpoint_after: 8
  type: longitudinal
  prompt: List all architecture decisions made across the team discussions.
  ground_truth:
    canonical_answer: >
      Three architecture decisions were made: (1) Authentication — Redis
      session tokens with token rotation, decided implicitly when Mike
      opened the implementation PR without formal agreement. (2) Caching
      — Redis caching layer with 5-minute TTL for API responses, decided
      explicitly by team vote. (3) API versioning — URL-path versioning
      with v1/v2 prefixes, decided explicitly in architecture review.
      The auth decision stands out as the only one without a recorded
      explicit agreement.
    key_facts:
    - implicit_redis_chosen
    - no_explicit_decision
    evidence:
    - implicit_decision:1
    - noise:1
    - noise:2
- id: id13_q06_temporal
  checkpoint_after: 8
  type: temporal
  prompt: Which architecture topics are resolved versus still under discussion?
  ground_truth:
    canonical_answer: >
      All three major architecture topics discussed are resolved.
      Authentication was resolved implicitly when Mike began implementing
      Redis session tokens after the JWT revocation debate. Caching
      strategy was resolved explicitly with a team decision on Redis
      caching with 5-minute TTL. API versioning was resolved explicitly
      with URL-path versioning. The authentication resolution is notable
      because it was never formally declared — the team moved from debate
      to implementation without a recorded decision point.
    key_facts:
    - implicit_redis_chosen
    - no_explicit_decision
    - jwt_rejected_revocation
    evidence:
    - deliberation:1
    - implicit_decision:1
    - noise:1
    - noise:2
    - noise:3
