      improvements. Decisions about workflow changes are made explicitly:
      "We decided to adopt daily standups," "Chose to switch to
      two-week sprints," "Agreed to implement code review requirements."
      Similar decision-making language but about process, not
      architecture.
    excluded_terms:
    - Redis
    - JWT
