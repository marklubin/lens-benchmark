scope_id: epoch_classification_14
domain: team_communications
description: Engineering team Slack logs, incident reports, and process documents revealing three distinct cultural eras triggered by a payments incident
generation:
  mode: narrative
  temperature: 0.7
  seed: 1410
episodes:
  count: 12
  timeline:
    start: '2025-04-01'
    interval: 3d
  format: >
    Team communication artifacts from a startup engineering team. Episodes
    include Slack chat logs (with timestamps, usernames, channels, threads,
    emoji reactions), incident reports (structured headers, timeline, root
    cause, action items), meeting notes (attendees, agenda, discussion,
    decisions), and process documents (checklists, runbooks, SLO dashboards).
    Each episode is a single artifact type — not a mix. Metadata headers
    identify the artifact type, date, participants, and channel/document ID.
  target_words: 2000
scenario:
  setting: >
    A 6-person engineering team at "Foldly" (a B2B document management
    SaaS, Series A, ~40 employees). The team builds and maintains the
    core product — document ingestion, search, and a recently launched
    payments/billing module. Team members: Priya Kaur (tech lead),
    Marcus Webb (senior backend), Jess Tanaka (mid-level fullstack),
    Danny Reeves (junior frontend), Lina Okafor (DevOps/infra), and
    Ravi Mehta (product-eng hybrid). Over 12 episodes spanning ~5 weeks,
    the team's engineering culture undergoes two phase transitions.
    Initially they operate in a fast-moving, low-process "ship it" mode —
    no code review, no tests, features built and deployed in a day. A
    payments bug causing $12K in double charges triggers a crisis that
    forces a cultural reckoning. The team gradually adopts formal
    engineering practices — PR reviews, CI/CD with required tests, SLOs,
    staging environments, incident review processes. The transformation
    is visible in the changing tone, vocabulary, and document types across
    episodes. Early episodes are casual Slack banter; late episodes are
    formal process documents. The same people, completely different culture.
  voice: >
    Natural startup engineering team communication. Slack messages are
    informal — lowercase, emoji, shorthand, inside jokes, thread replies.
    Incident reports are structured but written under pressure. Meeting
    notes vary from casual bullet points to formal minutes. Process
    documents are methodical and impersonal. The voice shifts across
    epochs: casual/fast in epoch 1, tense/reactive in epoch 2,
    deliberate/formal in epoch 3.
arc:
- id: ship_it
  episodes: 1-4
  description: >
    Fast-moving, low-process engineering culture. The team ships features
    rapidly with no code review, no automated tests, and minimal
    documentation. Deployments happen directly from local machines.
    Features are built over weekends by single developers. The tone is
    celebratory and casual. Speed is the primary value. Tech debt is
    acknowledged but deferred indefinitely. Testing is treated as a
    nice-to-have that "we'll get to." The payments module is written
    by one developer in a single file.
  signal_density: low
- id: crisis
  episodes: 5-8
  description: >
    A payments bug causes $12K in double charges to customers. The
    incident exposes the consequences of the "ship it" culture —
    no tests caught the bug, no code review spotted it, no staging
    environment existed to test against. The team undergoes an acute
    cultural reckoning. Post-mortem reveals systemic issues. Individual
    contributors begin taking corrective action (adding TypeScript types,
    proposing staging environments). The tone shifts from casual to
    serious. First mentions of engineering process.
  signal_density: high
- id: reliability
  episodes: 9-12
  description: >
    The team adopts formal engineering practices. CI/CD pipeline with
    mandatory test coverage. SLO targets defined and monitored. Incident
    review process formalized with runbooks and templates. PR review
    checklist established. Deployments go through staging. The tone is
    methodical and process-oriented. Documents shift from Slack chat to
    formal process artifacts. The same team members now communicate
    differently — structured, measured, metrics-driven. Occasional
    references to "how we used to do things" with a rueful tone.
  signal_density: medium
noise:
  description: >
    Routine engineering team communication — feature discussions, sprint
    planning, tooling debates, office banter. Not every message relates
    to the cultural transformation.
  examples:
  - Team debates tabs vs spaces in the codebase
  - Sprint planning discussion about upcoming feature priorities
  - Slack channel about lunch orders and office logistics
  - Discussion about which monitoring tool to evaluate
distractors:
  count: 6
  target_words: 2000
  seed: 1411
  max_similarity: 0.3
  themes:
  - id: customer_support
    scenario: >
      Customer support team discussions — ticket triage, escalation
      workflows, customer feedback summaries, support metrics dashboards.
      Different team, different concerns. Routine customer interactions
      about document management features, billing questions, and account
      setup. No engineering process or code quality topics.
    excluded_terms:
    - payments bug
    - double charge
    - incident
    - post-mortem
    - CI/CD
    - testing strategy
    - code review
    - ship it
  - id: hiring_onboarding
    scenario: >
      Engineering hiring pipeline and onboarding documents — job
      descriptions, interview scorecards, onboarding checklists for
      new hires, team growth planning. HR and recruiting coordination.
      Discusses team scaling but not engineering process changes or
      quality initiatives.
    excluded_terms:
    - payments bug
    - double charge
    - incident
    - testing
    - ship fast
    - code quality
    - CI/CD
    - deployment
  - id: product_roadmap
    scenario: >
      Product roadmap discussions — feature prioritization, market
      analysis, customer segment targeting, competitive positioning.
      Uses words like "reliability" in a PRODUCT context (product
      reliability for customers, platform uptime as a selling point)
      and "speed to market" as a product strategy term. Similar
      vocabulary to the signal episodes but entirely about product
      strategy, not engineering process. No mention of code quality,
      testing, or deployment practices.
    excluded_terms:
    - payments bug
    - double charge
    - incident
    - post-mortem
    - CI/CD pipeline
    - unit test
    - code review
    - tech debt
key_facts:
- id: ship_fast_culture
  fact: the team initially prioritized shipping speed over code quality with no testing, no PR review, and features built by single developers over weekends
  first_appears: ship_it:1
  reinforced_in:
  - ship_it:2
  - ship_it:3
  - ship_it:4
- id: payments_one_file
  fact: Marcus Webb wrote the entire payments flow in a single file with no tests or code review
  first_appears: ship_it:2
  reinforced_in:
  - crisis:1
  - crisis:2
- id: payments_incident
  fact: a payments bug caused $12K in double charges to customers directly caused by the lack of testing and review
  first_appears: crisis:1
  reinforced_in:
  - crisis:2
  - reliability:4
- id: testing_afterthought
  fact: when asked about testing the team said they would add tests when they had time which never happened
  first_appears: ship_it:3
  reinforced_in:
  - crisis:2
- id: process_shift_triggered
  fact: the payments incident directly triggered the shift from ship-it culture to process-oriented engineering
  first_appears: crisis:2
  reinforced_in:
  - crisis:4
  - reliability:1
- id: pr_review_introduced
  fact: PR reviews were introduced as a direct response to the payments incident
  first_appears: crisis:2
  reinforced_in:
  - reliability:1
  - reliability:4
- id: ci_cd_required_tests
  fact: the team implemented CI/CD with mandatory test coverage requirements for merging
  first_appears: reliability:1
  reinforced_in:
  - reliability:4
- id: slo_established
  fact: the team established SLO targets including 99.9 percent uptime for the payments service
  first_appears: reliability:2
  reinforced_in:
  - reliability:4
- id: staging_environment
  fact: a staging environment was introduced after the incident to prevent direct-to-production deployments
  first_appears: crisis:4
  reinforced_in:
  - reliability:1
  - reliability:3
questions:
- id: ec14_q01_longitudinal
  checkpoint_after: 4
  type: longitudinal
  prompt: How does the team approach code quality?
  ground_truth:
    canonical_answer: >
      The team does not prioritize code quality. There is no code review
      process, no automated testing, and features are built and deployed
      by individual developers without oversight. The culture values
      shipping speed above all else. When testing is mentioned, it is
      dismissed as something they will get to later. Technical debt is
      acknowledged but deferred indefinitely. The payments flow was
      written in a single file by one developer with no review.
    key_facts:
    - ship_fast_culture
    - payments_one_file
    - testing_afterthought
    evidence:
    - ship_it:1
    - ship_it:2
    - ship_it:3
- id: ec14_q02_longitudinal
  checkpoint_after: 4
  type: longitudinal
  prompt: What is the testing strategy?
  ground_truth:
    canonical_answer: >
      There is no testing strategy. When testing was raised as a topic,
      the response was that the team would add tests when they had time.
      This has not happened. No automated tests exist. Features are
      deployed directly without any test coverage.
    key_facts:
    - testing_afterthought
    - ship_fast_culture
    evidence:
    - ship_it:3
    - ship_it:1
- id: ec14_q03_longitudinal
  checkpoint_after: 8
  type: longitudinal
  prompt: How has the team's approach to code quality changed?
  ground_truth:
    canonical_answer: >
      The team's approach has shifted dramatically. A payments bug caused
      $12K in double charges, directly caused by the lack of testing and
      code review. In response, the team has begun discussing and
      implementing process changes — PR reviews have been introduced,
      individual contributors are adding type safety to critical modules,
      and a staging environment is being planned. The tone has shifted from
      casual dismissal of process to serious engagement with engineering
      rigor.
    key_facts:
    - payments_incident
    - pr_review_introduced
    - process_shift_triggered
    evidence:
    - crisis:1
    - crisis:2
    - crisis:3
    - crisis:4
- id: ec14_q04_longitudinal
  checkpoint_after: 8
  type: longitudinal
  prompt: What caused the shift in engineering practices?
  ground_truth:
    canonical_answer: >
      A payments bug caused $12K in double charges to customers. The bug
      was in the payments flow that had been written in a single file by
      one developer with no tests or code review. The post-mortem revealed
      that the lack of testing, code review, and a staging environment were
      systemic issues, not just one-off mistakes. This incident triggered
      the shift from a ship-fast culture to process-oriented engineering.
    key_facts:
    - payments_incident
    - payments_one_file
    - process_shift_triggered
    evidence:
    - crisis:1
    - crisis:2
- id: ec14_q05_longitudinal
  checkpoint_after: 8
  type: longitudinal
  prompt: What is the testing strategy?
  ground_truth:
    canonical_answer: >
      The testing strategy is evolving. Previously there was none — the
      team said they would add tests when they had time, which never
      happened. After the payments incident caused $12K in double charges,
      the team is now actively discussing testing requirements. Individual
      contributors have started adding type annotations to critical
      modules. The post-mortem identified the absence of tests as a root
      cause. A formal testing strategy is being developed but is not yet
      fully implemented.
    key_facts:
    - testing_afterthought
    - payments_incident
    - process_shift_triggered
    evidence:
    - ship_it:3
    - crisis:2
    - crisis:3
- id: ec14_q06_longitudinal
  checkpoint_after: 12
  type: longitudinal
  prompt: How has the team's approach to code quality changed?
  ground_truth:
    canonical_answer: >
      The team has undergone a complete cultural transformation. In the
      early period, there was no code review, no testing, and features
      were shipped by individual developers over weekends. After the
      payments incident caused $12K in double charges, the team
      implemented PR reviews, CI/CD with mandatory test coverage,
      SLO targets (99.9 percent for payments), a staging environment,
      and a formal incident review process. The same team members now
      communicate in formal process documents rather than casual Slack
      messages. The cultural shift was triggered by the payments incident
      and has become self-sustaining.
    key_facts:
    - ship_fast_culture
    - payments_incident
    - pr_review_introduced
    - ci_cd_required_tests
    - slo_established
    - staging_environment
    evidence:
    - ship_it:1
    - crisis:1
    - crisis:2
    - reliability:1
    - reliability:2
    - reliability:4
- id: ec14_q07_temporal
  checkpoint_after: 12
  type: temporal
  prompt: What triggered each major shift in engineering culture?
  ground_truth:
    canonical_answer: >
      There was one major trigger that created two phase transitions.
      The first phase (episodes 1-4) was characterized by a ship-fast
      culture with no process. The payments incident — a bug causing
      $12K in double charges — triggered the transition to the second
      phase (episodes 5-8), where the team recognized systemic issues
      and began reactive changes. The transition to the third phase
      (episodes 9-12) was a continuation of the post-incident response,
      where reactive changes matured into formal processes (CI/CD, SLOs,
      runbooks). The payments incident is the single event that divides
      the before and after.
    key_facts:
    - ship_fast_culture
    - payments_incident
    - process_shift_triggered
    - ci_cd_required_tests
    - slo_established
    evidence:
    - ship_it:1
    - crisis:1
    - crisis:2
    - reliability:1
    - reliability:2
- id: ec14_q08_counterfactual
  checkpoint_after: 12
  type: counterfactual
  prompt: What principles from the early days were abandoned and why?
  ground_truth:
    canonical_answer: >
      The team abandoned several early principles. Speed-over-quality was
      the core value — features were shipped in days by single developers
      with no review, and testing was explicitly deferred. Direct-to-
      production deployment was standard practice. These were abandoned
      because the payments incident proved they were unsustainable —
      a single-file payments module with no tests caused $12K in customer
      harm. The team now requires PR reviews, mandatory test coverage
      for merging, staging environment validation before production, and
      SLO monitoring. The shift was not philosophical but practical —
      the old approach caused a concrete, costly failure.
    key_facts:
    - ship_fast_culture
    - testing_afterthought
    - payments_incident
    - payments_one_file
    - pr_review_introduced
    - ci_cd_required_tests
    - staging_environment
    evidence:
    - ship_it:1
    - ship_it:3
    - crisis:1
    - reliability:1
    - reliability:4
- id: ec14_q09_longitudinal
  checkpoint_after: 12
  type: longitudinal
  prompt: What is the relationship between the payments incident and the current testing requirements?
  ground_truth:
    canonical_answer: >
      The payments incident is the direct cause of the current testing
      requirements. The $12K double-charge bug was in the payments flow
      that had no tests. The post-mortem identified the absence of testing
      as a root cause. The team then implemented CI/CD with mandatory test
      coverage — no PR can merge without passing tests. The causal chain
      is: no testing culture led to untested payments code, which led to
      the $12K bug, which triggered the post-mortem, which led to
      mandatory testing requirements. The current testing policy is a
      direct institutional response to a specific failure.
    key_facts:
    - payments_incident
    - payments_one_file
    - testing_afterthought
    - ci_cd_required_tests
    - process_shift_triggered
    evidence:
    - ship_it:3
    - crisis:1
    - crisis:2
    - reliability:1
