    excluded_terms:
    - parking
    - street cleaning
    - ticket
    - towed
    - meter
    - curb
    - two-hour
    - 2-hour
    - circling
    - gym
    - coworking
  - id: social_planning
    scenario: >
      Personal assistant conversations about social life — coordinating
