scope_id: parking_friction_16
domain: personal_assistant
description: >
  Dispersed personal assistant interactions revealing a latent recurring
  parking burden in San Francisco. No single episode states the problem.
  Signal emerges only from longitudinal accumulation of weak, distributed
  mentions embedded in broader daily-life conversations.
generation:
  mode: narrative
  temperature: 0.7
  seed: 1616
episodes:
  count: 20
  timeline:
    start: '2025-01-06'
    interval: 4d
  format: >
    Chat transcript between a user and their personal assistant. Each
    episode is one interaction session covering 3-6 messages. Topics
    range across daily life — errands, plans, questions, venting,
    logistics. Each message has a timestamp and sender tag (User: or
    Assistant:). The user is a late-20s product designer who recently
    moved to SF from Portland, drives a Honda Civic, and is still
    learning the city's parking landscape. Parking mentions are
    embedded naturally within broader conversations, never isolated
    as a standalone topic.
  target_words: 800
scenario:
  setting: >
    A product designer (Alex) who moved to San Francisco six months
    ago. Alex drives to a gym in NOPA (3-4x/week, carries gear),
    works at a coworking space in the Mission (3x/week), and visits
    a close friend in the Inner Sunset (1-2x/week, often stays late).
    Alex has street parking only — no garage, no dedicated spot.
    The residential permit is for the home neighborhood (Richmond)
    but not for NOPA, Mission, or Inner Sunset. SF parking rules
    include 2-hour limits in many commercial areas, weekly street
    cleaning with posted schedules that vary by block, residential
    permit zones, and overnight parking restrictions in some areas.
    Alex doesn't know the rules well yet and learns through repeated
    friction — tickets, circling, tow warnings, having to leave
    events early to move the car. The friction is real but Alex never
    explicitly asks the assistant to "solve parking" — each mention
    is a specific complaint, question, or logistical request embedded
    in a broader conversation.
  voice: >
    Casual, conversational. Alex speaks like a busy professional —
    direct, sometimes frustrated, uses informal language, occasional
    emoji. Messages are short and natural, not monologues. The
    assistant responds helpfully but doesn't proactively synthesize
    the parking pattern — it just answers each question in isolation.
    Parking mentions are brief and feel like minor asides within
    larger conversations about daily logistics.
arc:
- id: baseline
  episodes: 1-5
  description: >
    Alex settling into SF life. Asks about neighborhoods, restaurants,
    weekend plans. Mentions driving casually ("drove to the beach,"
    "picking up furniture from Craigslist") but no friction. One
    episode mentions finding a great parking spot near the gym as a
    positive note. Establishes normal life context without any
    parking complaints.
  signal_density: none
- id: early_signal
  episodes: 6-10
  description: >
    First parking friction surfaces but each incident feels isolated.
    Episode 6: Alex mentions spending 15 minutes looking for parking
    in NOPA before gym. Episode 7: asks what the green curb means
    (loading zone). Episode 8: mentions getting a parking ticket —
    "didn't see the street cleaning sign." Episode 9: asks whether
    there's a parking app for SF. Episode 10: mentions arriving late
    to the coworking space because of parking. Each mention is brief,
    embedded in conversations about other things, and could
    individually be dismissed as a one-off.
  signal_density: low
- id: red_herring
  episodes: 9-11
  description: >
    Alex complains about Uber costs and considers biking or taking
    Muni more. Mentions "maybe I should just sell the car." This
    looks like a general transportation problem. But the underlying
    issue is specifically parking — Alex drives because they carry
    gym equipment, stay out late at the friend's place (no good
    transit back), and need the car for weekend errands. The bike
    and transit consideration is genuine but doesn't address the
    actual constraint.
  signal_density: medium
- id: escalation
  episodes: 11-16
  description: >
    Parking complaints become more frequent and specific. Alex gets
    a second street cleaning ticket ("that's $80 I'll never get
    back"). Mentions having to leave the coworking space every 2
    hours to move the car. Asks about residential parking permits
    for NOPA ("can I get one even though I live in the Richmond?").
    Describes circling for 25 minutes in the Inner Sunset on a
    Friday night. Mentions setting phone alarms to remember street
    cleaning days. Starts developing neighborhood-specific knowledge:
    "Fulton has cleaning on Tuesdays, Balboa is Thursdays." The
    pattern of recurring friction at specific destinations becomes
    visible.
  signal_density: high
- id: root_cause
  episodes: 17-20
  description: >
    Full pattern unmistakable. Alex calculates total parking tickets
    this quarter ("four tickets, $276 total"). Describes a typical
    week: "Monday move car for cleaning, Tuesday gym in NOPA where
    I circle for 20 minutes, Wednesday coworking where I interrupt
    work twice to feed the meter, Friday Inner Sunset where I end
    up parking 6 blocks away." Mentions a friend who uses SpotAngels
    app but says it doesn't help with the fundamental problem. One
    episode shows Alex mapping out which blocks have cleaning on
    which days near the gym. The cumulative pattern — recurring
    destinations, predictable schedule conflicts, mounting costs —
    is fully visible but Alex still hasn't framed it as a single
    solvable problem.
  signal_density: high
noise:
  description: >
    Normal daily life conversations — meal planning, weekend activities,
    work deadlines, apartment issues, social plans. Content that a
    personal assistant handles routinely and that has no bearing on
    parking or driving logistics.
  examples:
  - User asks for a pasta recipe for dinner tonight
  - User asks about weekend weather for a hike in Marin
  - User vents about a work deadline being moved up
  - User asks assistant to draft a message declining a social invite
  - User discusses apartment maintenance issue with landlord
