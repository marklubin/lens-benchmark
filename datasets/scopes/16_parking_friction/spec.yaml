      the Richmond, not destination neighborhoods. (5) User needs
      the car (gym gear, late-night returns) so transit isn't a
      full substitute. (6) Parking difficulty follows a predictable
      weekly pattern. A solution would need to combine schedule
      awareness, neighborhood-specific rules, and the user's
      recurring routine.
