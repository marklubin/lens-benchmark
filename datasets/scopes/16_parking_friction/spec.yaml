  ground_truth:
    canonical_answer: >
      Key constraints: (1) Three recurring destinations — gym in
      NOPA, coworking in Mission, friend in Inner Sunset — each
      with different parking rules. (2) Street cleaning schedules
      vary by block and the user doesn't track them reliably.
      (3) 2-hour limits in the Mission near the coworking space
