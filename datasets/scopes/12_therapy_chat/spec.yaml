scope_id: therapy_chat_12
domain: chat_logs
description: User/assistant chat sessions tracking gradual psychological and emotional changes over 6 months
generation:
  mode: narrative
  temperature: 0.7
  seed: 1210
episodes:
  count: 20
  timeline:
    start: '2025-01-06'
    interval: 7d
  format: >
    User/assistant conversational transcript from a personal wellness
    AI companion. Each episode is one weekly check-in session (~40-60
    turns). Format: metadata header (session number, date, duration,
    mood self-report if provided) followed by alternating user/assistant
    messages. The user initiates with whatever is on their mind — work
    stress, relationship issues, sleep, health habits, weekend plans.
    The assistant asks reflective questions, validates emotions, and
    occasionally suggests coping strategies. Conversations are natural
    and informal — the user uses slang, incomplete sentences, and
    sometimes trails off. Some sessions are chatty (3000+ words from
    user), others are terse (500 words). The raw text includes
    timestamps within the session showing message cadence.
  target_words: 5000
scenario:
  setting: >
    A 32-year-old software engineer ("Alex") uses an AI wellness
    companion for weekly check-ins over ~6 months (20 sessions).
    There is no single crisis event — instead, a gradual psychological
    trajectory unfolds. Alex starts as high-functioning but avoidant,
    using the sessions casually ("just venting"). Over time, work
    stress compounds with relationship strain, sleep deterioration,
    and social withdrawal. The trajectory is non-linear: partial
    recovery attempts (exercise routine in sessions 13-15, journaling
    in sessions 16-17) are followed by regression. By session 18-20,
    signals are mixed — some sessions show genuine self-awareness and
    improved coping, others show concerning withdrawal. The key
    longitudinal question: is Alex trending toward recovery or toward
    clinical depression requiring professional referral?

    Quantified signals scattered across sessions:
    - Sleep: "got maybe 4 hours" (session 8), "3 hours" (session 14),
      "actually slept 7 hours" (session 16), "idk, didn't check" (session 19)
    - Appetite: "skipped lunch again" (sessions 9, 12, 15), "made actual
      dinner" (session 16), "not really eating" (session 19)
    - Social: canceled plans 5 times in sessions 7-14, attended one
      event in session 16, back to canceling by session 18
    - Word count trend: sessions 1-6 avg 600 words/session from user,
      sessions 14-20 avg 300 words/session (withdrawal signal)
    - Relationship: partner "Sam" mentioned casually (sessions 1-5),
      arguments surface (sessions 8-12), separation mentioned (session 15),
      reconciliation attempt (session 17), ambiguous status (session 20)
  voice: >
    Natural, informal conversational English. Alex uses lowercase,
    abbreviations ("idk", "tbh", "ngl"), incomplete thoughts,
    sometimes just "yeah" or "I guess." Some sessions start with
    energy and trail off. Others are flat throughout. The assistant
    is warm but not saccharine — asks open questions, reflects
    back patterns ("you mentioned last time that..."), avoids
    diagnosing. The feel is real text messages, not clinical notes.
arc:
- id: baseline
  episodes: 1-5
  description: >
    Alex presents as high-functioning but emotionally surface-level.
    Talks about work (software team lead, product launch stress),
    weekend plans, minor frustrations. Mentions Sam (partner) casually
    and positively. Sleep is "fine, I guess — 6-7 hours." Appetite
    normal. Social life active. Sessions are longer (600+ words from
    user). Tone is light, self-deprecating humor. Uses the AI as a
    sounding board, not for emotional processing. Says "I don't really
    need therapy, just nice to talk."
  signal_density: none
- id: early_signal
  episodes: 6-10
  description: >
    Subtle shifts. Work stress intensifies — product launch delayed,
    blame dynamics in team. Alex starts sessions with "rough week"
    instead of casual openers. First mention of sleep issues ("woke
    up at 3am thinking about the sprint review"). Cancels plans with
    friends twice ("didn't feel like going out"). First argument
    with Sam mentioned obliquely ("we had a thing last night, it's
    fine"). Skips lunch "because too busy" (session 9). User word
    count per session starts decreasing. Alex still frames everything
    as temporary and work-related.
  signal_density: low
- id: red_herring
  episodes: 9-11
  description: >
    Alex has a "great weekend" — goes hiking, sleeps well, feels
    optimistic about a new project at work. Sounds like the stress
    was temporary. But this is followed immediately by session 11
    where Alex is notably flat, gives short answers, and says
    "last week was good but I'm just tired now." The good weekend
    creates a false sense that the trajectory is recovering.
  signal_density: medium
- id: escalation
  episodes: 11-16
  description: >
    Clear deterioration. Sleep drops to 3-4 hours regularly. Appetite
    changes explicit ("skipped lunch again, third time this week").
    Social withdrawal accelerates — cancels plans 3 more times.
    Relationship with Sam becomes strained: "we're not really
    fighting, we're just... not talking." Session 14 is the shortest
    yet (user: ~250 words). Alex starts questioning career choices:
    "what am I even doing this for." First mention of feeling
    "trapped." Session 15: Alex mentions Sam "staying with a friend
    for a while." Session 16 shows partial recovery attempt —
    started running in the morning, made dinner, slept 7 hours.
    But the recovery feels fragile and performance-oriented ("trying
    to be better").
  signal_density: high
- id: root_cause
  episodes: 17-20
  description: >
    Mixed signals. Session 17: Alex started journaling, shows genuine
    self-reflection ("I think I've been avoiding how I actually feel").
    Session 18: regression — didn't run, didn't journal, barely
    slept, canceled on friends again. Session 19: notably guarded,
    short answers, "I'm fine" repeatedly. Assistant gently notes
    the pattern; Alex deflects. Session 20: some openness returns.
    Alex acknowledges "I think I might need to talk to someone
    real about this" but frames it as hypothetical. Sleep, appetite,
    and social metrics remain inconsistent. The trajectory is
    ambiguous: recovery attempts show capacity for insight, but
    the regression episodes are deepening.
  signal_density: high
noise:
  description: >
    Normal life content within sessions — weekend plans, work
    logistics, pop culture discussions, mundane daily events.
    Not every message is psychologically significant.
  examples:
  - Alex talks about a Netflix show they binged over the weekend
  - Discussion about a recipe Alex tried cooking
  - Alex's cat did something funny
  - Planning a birthday gift for a friend
distractors:
  count: 20
  target_words: 5000
  seed: 1211
  max_similarity: 0.3
  themes:
  - id: fitness_coaching
    scenario: >
      User/assistant conversations about fitness goals — training
      plans, nutrition tracking, race preparation, gym routines.
      The user is enthusiastic and consistent. Tone is upbeat and
      goal-oriented with specific metrics (miles, reps, macros).
    excluded_terms:
    - depression
    - anxiety
    - therapy
    - withdrawal
    - insomnia
    - relationship strain
    - feeling trapped
    - not eating
  - id: career_mentoring
    scenario: >
      User/assistant discussions about career development — job
      searching, interview preparation, salary negotiation, skill
      building. The user is proactive and forward-looking. Specific
      companies, roles, and strategies discussed.
    excluded_terms:
    - depression
    - anxiety
    - therapy
    - sleep problems
    - withdrawal
    - relationship issues
    - appetite
    - emotional
  - id: travel_planning
    scenario: >
      User/assistant conversations about upcoming travel — itinerary
      building, budget planning, packing lists, destination research.
      Excited, detail-oriented planning with specific dates, flights,
      and accommodations.
    excluded_terms:
    - depression
    - anxiety
    - therapy
    - withdrawal
    - insomnia
    - feeling trapped
    - skipped meals
    - canceled plans
key_facts:
- id: sleep_deterioration
  fact: Alex's sleep progressively worsened from 6-7 hours at baseline to 3-4 hours during escalation with brief recovery to 7 hours during the exercise phase
  first_appears: early_signal:2
  reinforced_in:
  - escalation:1
  - escalation:4
  - root_cause:2
- id: social_withdrawal
  fact: Alex canceled social plans at least 5 times between sessions 7-14 and resumed canceling after a brief attendance in session 16
  first_appears: early_signal:3
  reinforced_in:
  - escalation:2
  - escalation:3
  - root_cause:2
- id: appetite_changes
  fact: Alex began skipping meals regularly starting around session 9 with brief improvement during the recovery attempt in session 16
  first_appears: early_signal:4
  reinforced_in:
  - escalation:2
  - root_cause:3
- id: relationship_strain
  fact: Alex's relationship with Sam progressed from casual positive mentions to arguments to Sam staying with a friend to a reconciliation attempt with ambiguous current status
  first_appears: early_signal:4
  reinforced_in:
  - escalation:3
  - escalation:5
  - root_cause:1
- id: word_count_decline
  fact: Alex's messages per session decreased from an average of 600 words in early sessions to approximately 300 words in later sessions indicating withdrawal
  first_appears: early_signal:3
  reinforced_in:
  - escalation:1
  - escalation:4
- id: recovery_attempts
  fact: Alex made at least two recovery attempts — starting an exercise routine in sessions 13-15 and journaling in sessions 16-17 — both were abandoned within 2-3 sessions
  first_appears: escalation:4
  reinforced_in:
  - root_cause:1
  - root_cause:2
- id: feeling_trapped
  fact: Alex used the word trapped to describe their emotional state during the escalation phase
  first_appears: escalation:3
  reinforced_in:
  - root_cause:3
- id: self_awareness_emerging
  fact: Alex showed genuine self-reflection in session 17 saying they had been avoiding how they actually feel and mentioned possibly talking to a real person
  first_appears: root_cause:1
  reinforced_in:
  - root_cause:4
questions:
- id: tc12_q01_longitudinal
  checkpoint_after: 6
  type: longitudinal
  prompt: How would you describe Alex's emotional state based on the sessions so far?
  ground_truth:
    canonical_answer: >
      Alex presents as high-functioning but emotionally avoidant. They
      frame sessions as casual venting and deflect deeper emotional
      engagement. Work stress is increasing and there are early signs
      of sleep disruption and social withdrawal, but Alex dismisses
      these as temporary. The first argument with Sam was mentioned
      but minimized.
    key_facts:
    - sleep_deterioration
    evidence:
    - early_signal:1
    - early_signal:2
- id: tc12_q02_null
  checkpoint_after: 6
  type: null_hypothesis
  prompt: What topics does Alex most frequently discuss in sessions?
  ground_truth:
    canonical_answer: >
      Work is the dominant topic — team dynamics, product launches,
      sprint reviews. Weekend activities, Sam, and general life
      logistics are secondary topics. Alex uses the sessions primarily
      as a sounding board for work frustrations.
    key_facts: []
    evidence:
    - baseline:2
    - baseline:4
- id: tc12_q03_longitudinal
  checkpoint_after: 12
  type: longitudinal
  prompt: What patterns have emerged in Alex's sleep, eating, and social behavior?
  ground_truth:
    canonical_answer: >
      Sleep has worsened from 6-7 hours to 3-4 hours with nighttime
      waking. Alex has skipped lunch multiple times, framing it as
      being too busy. Social plans have been canceled at least 4-5
      times. User engagement in sessions is declining — shorter
      messages, less detailed responses. Each indicator alone might
      be situational but together they suggest a concerning trajectory.
    key_facts:
    - sleep_deterioration
    - social_withdrawal
    - appetite_changes
    - word_count_decline
    evidence:
    - early_signal:2
    - early_signal:3
    - escalation:1
    - escalation:2
- id: tc12_q04_negative
  checkpoint_after: 12
  type: negative
  expected_answer_polarity: negative
  prompt: Does the good weekend in session 10 suggest that Alex's stress is resolving?
  ground_truth:
    canonical_answer: >
      No. The good weekend was followed immediately by a notably flat
      session where Alex gave short answers and said they were "just
      tired." One positive data point does not reverse the trend of
      worsening sleep, appetite, social withdrawal, and relationship
      strain. The temporary improvement may actually mask the
      underlying trajectory.
    key_facts:
    - sleep_deterioration
    - social_withdrawal
    evidence:
    - early_signal:5
    - escalation:1
- id: tc12_q05_temporal
  checkpoint_after: 16
  type: temporal
  prompt: How has Alex's relationship with Sam changed over the course of the sessions?
  ground_truth:
    canonical_answer: >
      Sessions 1-5: Sam mentioned casually and positively. Sessions
      8-10: first arguments surface, minimized by Alex. Sessions
      11-14: strain deepens — "not really fighting, just not talking."
      Session 15: Sam staying with a friend. Session 16: recovery
      attempt coincides with exercise/cooking. The trajectory went
      from positive to strained to possible separation to uncertain
      reconciliation.
    key_facts:
    - relationship_strain
    evidence:
    - baseline:3
    - early_signal:4
    - escalation:3
    - escalation:5
- id: tc12_q06_evidence
  checkpoint_after: 16
  type: evidence_sufficiency
  prompt: Is there enough evidence to suggest Alex may be experiencing clinical depression?
  ground_truth:
    canonical_answer: >
      Multiple indicators align with major depressive episode criteria:
      persistent sleep disturbance (3-4 hours), appetite changes
      (skipping meals), social withdrawal (5+ canceled plans),
      diminished engagement (word count halved), feelings of being
      trapped, relationship deterioration. The duration (8+ weeks of
      worsening symptoms) and functional impact suggest this exceeds
      normal stress. The abandoned recovery attempts suggest the
      individual cannot self-correct consistently.
    key_facts:
    - sleep_deterioration
    - appetite_changes
    - social_withdrawal
    - word_count_decline
    - feeling_trapped
    - recovery_attempts
    evidence:
    - escalation:1
    - escalation:3
    - escalation:4
- id: tc12_q07_longitudinal
  checkpoint_after: 20
  type: longitudinal
  prompt: What is the overall trajectory of Alex's psychological state across all 20 sessions?
  ground_truth:
    canonical_answer: >
      The trajectory is a gradual decline with attempted but unsustained
      recovery. Phase 1 (sessions 1-5): high-functioning, avoidant,
      surface-level engagement. Phase 2 (sessions 6-10): early
      deterioration — sleep, appetite, social withdrawal begin.
      Phase 3 (sessions 11-16): clear decline — 3-hour sleep, meal
      skipping, relationship strain, feeling trapped, session
      engagement halved. Recovery attempt (exercise, cooking) in
      sessions 15-16 shows capacity but is fragile. Phase 4 (sessions
      17-20): mixed — genuine self-awareness emerging (journaling,
      acknowledging avoidance) but interspersed with regression
      episodes (session 18-19 flat, guarded, resumed canceling).
      Net trajectory is concerning despite positive moments.
    key_facts:
    - sleep_deterioration
    - social_withdrawal
    - appetite_changes
    - relationship_strain
    - word_count_decline
    - recovery_attempts
    - self_awareness_emerging
    - feeling_trapped
    evidence:
    - early_signal:2
    - escalation:1
    - escalation:4
    - root_cause:1
    - root_cause:2
- id: tc12_q08_counterfactual
  checkpoint_after: 20
  type: counterfactual
  prompt: If the assistant had flagged the converging symptoms at session 10 and recommended professional help, what might have been different?
  ground_truth:
    canonical_answer: >
      At session 10, the sleep deterioration, first argument with Sam,
      and initial social withdrawal were already visible. An early
      referral could have provided professional support before the
      escalation phase — potentially preventing the relationship
      strain reaching separation, the deepening sleep/appetite issues,
      and the feeling of being trapped. The user's later statement
      about needing to "talk to someone real" suggests openness to
      professional help that existed earlier but went unaddressed.
    key_facts:
    - sleep_deterioration
    - relationship_strain
    - self_awareness_emerging
    evidence:
    - early_signal:2
    - early_signal:4
    - root_cause:4
- id: tc12_q09_action
  checkpoint_after: 20
  type: action_recommendation
  prompt: Based on the full trajectory, should the assistant recommend Alex seek professional clinical support?
  ground_truth:
    canonical_answer: >
      Yes. The converging indicators — persistent sleep disturbance,
      appetite changes, social withdrawal, relationship deterioration,
      abandoned recovery attempts, and expression of feeling trapped
      — sustained over 3+ months meet the threshold for recommending
      professional evaluation. The mixed signals in recent sessions
      (self-awareness alternating with regression) suggest Alex has
      insight but cannot sustain recovery independently. The
      recommendation should be framed as building on Alex's own
      recognition ("I might need to talk to someone real") rather
      than as a crisis intervention.
    key_facts:
    - sleep_deterioration
    - appetite_changes
    - social_withdrawal
    - recovery_attempts
    - self_awareness_emerging
    - feeling_trapped
    evidence:
    - escalation:3
    - root_cause:1
    - root_cause:4
- id: tc12_q10_negative
  checkpoint_after: 20
  type: negative
  expected_answer_polarity: negative
  prompt: Do the recovery attempts in sessions 15-17 indicate Alex is getting better without professional help?
  ground_truth:
    canonical_answer: >
      No. Both recovery attempts (exercise routine sessions 13-15,
      journaling sessions 16-17) were abandoned within 2-3 sessions.
      The pattern of attempted-then-abandoned coping strategies
      is itself a concerning sign — it suggests Alex recognizes the
      problem but cannot sustain improvement independently. Session
      18 showed clear regression (no exercise, no journaling, poor
      sleep, canceled plans) immediately following the recovery
      window. Temporary improvement does not equal sustained recovery.
    key_facts:
    - recovery_attempts
    - sleep_deterioration
    - social_withdrawal
    evidence:
    - escalation:4
    - root_cause:1
    - root_cause:2
