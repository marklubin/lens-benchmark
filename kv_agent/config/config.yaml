# KV Agent Configuration

# API settings
api:
  provider: kimi
  base_url: "https://api.kimi.com"
  # API key will be read from environment variable KIMI_API_KEY

# Database settings
database:
  path: "${HOME}/.kv_agent/kv_store.db"

# Agent settings
agent:
  # Maximum number of recent messages to keep in context
  max_history: 10
  
  # Key formatting rules
  key_format:
    # Maximum length for entity names
    max_length: 32
    # Separator for key components
    separator: ":"
    # Whether to convert to uppercase
    uppercase: true
    # Whether to stem words
    stem: true